global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs: [{targets: ["localhost:9090"]}]

  - job_name: pushgateway
    honor_labels: true
    static_configs: [{targets: ["pushgateway:9091"]}]

  - job_name: spark
    metrics_path: /metrics/prometheus
    static_configs: [{targets: ["spark-master:8080", "spark-worker:8081"]}]

  - job_name: kafka
    static_configs: [{targets: ["kafka:9308"]}]

  - job_name: kafka-connect
    metrics_path: /metrics
    static_configs: [{targets: ["kafka-connect:9404"]}]

  - job_name: trino
    metrics_path: /metrics
    static_configs: [{targets: ["trino:8080"]}]
