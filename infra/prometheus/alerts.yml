groups:
  - name: cdc-pipeline
    rules:
      - alert: HighEndToEndLag
        expr: cdc_end_to_end_lag_seconds > 300
        for: 5m
        labels: {severity: warning}
        annotations:
          summary: "CDC lag > 5m for {{ $labels.table }}"
          description: "End-to-end lag has exceeded the SLA for 5 minutes."

      - alert: DQValidationFailing
        expr: increase(cdc_dq_validation_failures_total[15m]) > 0
        for: 1m
        labels: {severity: critical}
        annotations:
          summary: "Data-quality failures in {{ $labels.suite }}"

      - alert: BatchStalled
        expr: rate(cdc_events_total[10m]) == 0
        for: 10m
        labels: {severity: critical}
        annotations:
          summary: "No CDC events processed for {{ $labels.table }} in 10m"
