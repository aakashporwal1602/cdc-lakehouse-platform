name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v7
        with: {fetch-depth: 0}
      - name: Generate changelog
        id: changelog
        run: |
          echo "## Changes" > NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD \
            --pretty=format:'- %s (%h)' >> NOTES.md || true
      - uses: softprops/action-gh-release@v2
        with: {body_path: NOTES.md, generate_release_notes: true}
