# For local dev; in CI/prod inject via env vars.
cdc_gold:
  target: dev
  outputs:
    dev:
      type: trino
      method: none
      host: "{{ env_var('TRINO_HOST', 'localhost') }}"
      port: "{{ env_var('TRINO_PORT', 8080) | int }}"
      user: "{{ env_var('TRINO_USER', 'analytics') }}"
      catalog: lakehouse
      schema: gold
      threads: 4
      http_scheme: http
